<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Safra</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    /* ============================================================
       CORES — mesmas do portfolio.html para manter consistência
    ============================================================ */
    :root {
      --cor-fundo:    #f5f5f3;
      --cor-cartao:   #ffffff;
      --cor-borda:    #e0e0e0;
      --cor-texto:    #1a1a1a;
      --cor-muted:    #6b6b6b;
      --cor-destaque: #2563eb;
      --fonte:        'Inter', sans-serif;
      --raio:         10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--fonte);
      background: var(--cor-fundo);
      color: var(--cor-texto);
      line-height: 1.6;
    }

    a { color: var(--cor-destaque); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ============================================================
       NAVEGAÇÃO
    ============================================================ */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.25rem 2rem;
      background: var(--cor-cartao);
      border-bottom: 1px solid var(--cor-borda);
    }

    nav .logo {
      font-weight: 600;
      font-size: 1rem;
      color: var(--cor-texto);
    }

    .btn-voltar {
      font-size: 0.875rem;
      color: var(--cor-muted);
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }

    .btn-voltar:hover { color: var(--cor-destaque); text-decoration: none; }

    /* ============================================================
       CABEÇALHO DO PROJETO
    ============================================================ */
    .projeto-header {
      max-width: 720px;
      margin: 0 auto;
      padding: 3rem 2rem 2rem;
    }

    .projeto-tags {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      margin-bottom: 0.75rem;
    }

    .tag {
      font-size: 0.72rem;
      padding: 2px 8px;
      border-radius: 20px;
      background: var(--cor-cartao);
      border: 1px solid var(--cor-borda);
      color: var(--cor-muted);
    }

    .projeto-header h1 {
      font-size: 1.75rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .projeto-header p {
      font-size: 0.95rem;
      color: var(--cor-muted);
      max-width: 560px;
      margin-bottom: 1.25rem;
    }

    /* Links externos (GitHub, demo, etc.) */
    .projeto-links {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-block;
      padding: 0.5rem 1.1rem;
      border: 1px solid var(--cor-borda);
      border-radius: var(--raio);
      font-size: 0.875rem;
      color: var(--cor-texto);
      background: var(--cor-cartao);
      transition: border-color 0.2s, color 0.2s;
    }

    .btn:hover {
      border-color: var(--cor-destaque);
      color: var(--cor-destaque);
      text-decoration: none;
    }

    hr {
      max-width: 720px;
      margin: 0 auto;
      border: none;
      border-top: 1px solid var(--cor-borda);
    }

    /* ============================================================
       SLIDES — cada slide é uma imagem em rolagem vertical
    ============================================================ -->
    ============================================================ */
    .slides {
      max-width: 720px;
      margin: 0 auto;
      padding: 2rem 2rem 4rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    /* ── SLIDE ──────────────────────────────────────────────────
       Cada <figure> é um slide.
       Troque o src da <img> pela imagem do seu slide.
       A legenda (<figcaption>) é opcional — apague se não quiser.
    ────────────────────────────────────────────────────────────── */
    .slide {
      background: var(--cor-cartao);
      border: 1px solid var(--cor-borda);
      border-radius: var(--raio);
      overflow: hidden;
    }

    .slide img {
      width: 100%;
      display: block;
      /* Se quiser altura fixa com corte: */
      /* height: 420px; object-fit: cover; */
    }

    .slide figcaption {
      padding: 0.75rem 1rem;
      font-size: 0.82rem;
      color: var(--cor-muted);
      border-top: 1px solid var(--cor-borda);
    }

    /* ============================================================
       RODAPÉ
    ============================================================ */
    footer {
      text-align: center;
      padding: 2rem;
      font-size: 0.8rem;
      color: var(--cor-muted);
      border-top: 1px solid var(--cor-borda);
    }
  </style>
</head>
<body>

  <!-- ============================================================
       NAVEGAÇÃO
  ============================================================ -->
  <nav>
    <span class="logo">Portifólio de projetos acadêmicos</span>
    <!-- O href abaixo volta para o portfólio -->
    <a class="btn-voltar" href="código.html">← Voltar</a>
  </nav>


  <!-- ============================================================
       CABEÇALHO DO PROJETO
       Edite o título, descrição e tags abaixo
  ============================================================ -->
  <section class="projeto-header">

    <!-- TAGS: tecnologias usadas -->
    <div class="projeto-tags">
      <span class="tag">Plano de negócios</span>

    </div>

    <!-- TÍTULO DO PROJETO -->
    <h1>Reviva Construções</h1>

    <!-- DESCRIÇÃO -->
    <p>
      Plano de negócios desenvolvido na disciplina de empreendedorismo no IFCE
    </p>

  </section>

  <hr />

  <!-- ============================================================
       SLIDES
       Cada <figure class="slide"> é um slide.
       Troque o src pela imagem do seu slide (mesmo arquivo ou URL).
       Copie e cole quantos blocos quiser para adicionar mais slides.
  ============================================================ -->
  <section class="slides">

    <!-- ── SLIDE 1 ─────────────────────────────────────────── -->
    <figure class="slide">

      <!-- Legenda opcional — apague o <figcaption> se não quiser -->

    <figure class="slide">

    </figure>

    <figure class="slide">
      <img src="slide-reviva/5.png" alt="Slide" />
    </figure>

    <figure class="slide">
      <img src="slide-reviva/6.png" alt="Slide" />
    </figure>

    <figure class="slide">
      <img src="slide-reviva/7.png" alt="Slide" />
    </figure>

    <figure class="slide">
      <img src="slide-reviva/8.png" alt="Slide" />
    </figure>

    <figure class="slide">
      <img src="slide-reviva/9.png" alt="Slide" />
    </figure>

    <figure class="slide">
      <img src="slide-reviva/10.png" alt="Slide" />
    </figure>

    <figure class="slide">
      <img src="slide-reviva/11.png" alt="Slide" />
    </figure>

    <figure class="slide">
      <img src="slide-reviva/12.png" alt="Slide" />
    </figure>

    <figure class="slide">
      <img src="slide-reviva/13.png" alt="Slide" />
    </figure>

    <figure class="slide">
      <img src="slide-reviva/14.png" alt="Slide" />
    </figure>

    <figure class="slide">
      <img src="slide-reviva/15.png" alt="Slide" />
    </figure>

    <figure class="slide">
      <img src="slide-reviva/16.png" alt="Slide" />
    </figure>

    <figure class="slide">
      <img src="slide-reviva/17.png" alt="Slide" />
    </figure>

    <!-- ── COPIE ESTE BLOCO PARA ADICIONAR MAIS SLIDES ──────
    <figure class="slide">
      <img src="SLIDE.jpg" alt="Slide" />
    </figure>
    ─────────────────────────────────────────────────────────── -->

  </section>
  <!-- ============================================================
       RODAPÉ
  ============================================================ -->
  <footer>
    Feito por Alan Mateus · Fortaleza, CE
  </footer>

</body>
</html>
